name: Deploy to TEST instance

on:
  pull_request:
    types: [closed]

permissions:
  contents: write  # Required to create tags

jobs:
  deploy_to_test:
    name: Publish and Deploy to TEST
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Fetch all history for tags

    - name: Publish App from DEV
      id: publish_app
      uses: ServiceNow/sncicd-publish-app@2.0.1
      with:
        versionFormat: detect
      env:
        nowUsername: ${{ secrets.SN_DEV_USERNAME }}
        nowPassword: ${{ secrets.SN_DEV_PASSWORD }}
        nowSourceInstance: ${{ secrets.NOW_DEV_INSTANCE }}
        appSysID: ${{ secrets.APP_SYS_ID }}
          
    - name: Create Git Tag
      if: ${{ success() && steps.publish_app.outputs.newVersion }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Delete tag if it exists locally
        git tag -d "${{ steps.publish_app.outputs.newVersion }}" 2>/dev/null || true
        
        # Delete tag if it exists on remote
        git push origin :refs/tags/${{ steps.publish_app.outputs.newVersion }} 2>/dev/null || true
        
        # Create new tag
        git tag "${{ steps.publish_app.outputs.newVersion }}"
        
        # Push new tag to remote
        git push origin "${{ steps.publish_app.outputs.newVersion }}"

    - name: Install to TEST Instance
      if: ${{ success() && steps.publish_app.outputs.newVersion }}
      uses: ServiceNow/sncicd-install-app@2.0.0
      with:
        version: ${{ steps.publish_app.outputs.newVersion }}
      env:
        nowUsername: ${{ secrets.SN_TEST_USERNAME }}
        nowPassword: ${{ secrets.SN_TEST_PASSWORD }}
        nowInstallInstance: ${{ secrets.NOW_TEST_INSTANCE }}
        appSysID: ${{ secrets.APP_SYS_ID }}
        appScope: ${{ secrets.APP_SCOPE }}
